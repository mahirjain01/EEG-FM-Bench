  mask_ratio: 0.55
  aux_loss_weight: 0.1
  which_mask: "default"
  fuzzy_noise_std: 0.0
  spatial_radius_black: 3.0
  spatial_radius_fuzzy: 4.0
  temporal_radius_black: 3.0
  temporal_radius_fuzzy: 4.0
  dropout_ratio: 0.1
  dropout_radius: 3.0
  ema_mix_ratio: 0.6
  ema_temperature: 2.0
  ema_floor_eps: 0.1

  use_pairwise_channel_diffs: false
  n_spatial_coords: 3
  posenc_n_freqs: 4
  sigma_noise: 0.25

  attn_dropout: 0.0
  use_flash_attention: true

  train_method: "linear_probe"

training:
  max_epochs: 30
  lr_schedule: "cosine"
  max_lr: 2e-4
  min_lr: 2e-5
  use_amp: true
