model_type: cosine_split_mae
fs: 200

data:
  batch_size: 16
  num_workers: 4
  datasets:
    motor_mv_img: finetune
    workload: finetune
    hmc: finetune
    siena_scalp: finetune
    adftd: finetune
    bcic_2a: finetune

logging:
  experiment_name: "hear_corrected_cosine_split_mae_eval"
  run_dir: "/home/neurodx/mahir/EEG-FM-Bench/.eegfm/run/hear_corrected_cosine_split_mae_eval"
  project: "eeg-fm-bench"
  use_cloud: false
  ckpt_interval: 0

model:
  pretrained_path: "/home/neurodx/mahir/ndx-pipeline/runs/HEAR_corrected/2026-03-26_14-38-58/mae_epoch_27.pt"
  source_mae_path: "/home/neurodx/mahir/ndx-pipeline/models/mae_model.py"

  fs: 200
  patch_seconds: 1.0
  overlap_seconds: 0.1
  embed_dim: 512
  encoder_depth: 22
  encoder_heads: 8
  decoder_depth: 4
