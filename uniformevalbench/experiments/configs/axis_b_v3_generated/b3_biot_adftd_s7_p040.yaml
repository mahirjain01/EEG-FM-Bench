seed: 7
master_port: 52007
multitask: false
model_type: biot
fs: 200
data:
  batch_size: 32
  num_workers: 4
  datasets:
    adftd: finetune
model:
  classifier_head:
    head_type: avg_pool
    hidden_dims:
    - 128
    dropout: 0.3
  emb_size: 256
  heads: 8
  depth: 4
  max_channels: 18
  n_fft: 200
  hop_length: 100
  use_channel_conv: true
  pretrained_path: /mnt/eegfmbench/FM_checkpoints/biot/EEG-six-datasets-18-channels.ckpt
training:
  max_epochs: 30
  weight_decay: 0.01
  max_grad_norm: 3.0
  lr_schedule: cosine
  max_lr: 0.0005
  encoder_lr_scale: 0.1
  warmup_epochs: 2
  warmup_scale: 0.01
  pct_start: 0.2
  min_lr: 1.0e-06
  freeze_encoder: true
  use_amp: false
  label_smoothing: 0.1
  lora:
    use_lora: false
logging:
  experiment_name: b3_biot_adftd_s7_p040
  run_dir: /mnt/eegfmbench/runs/uniformeval/axis_b_v3
  use_cloud: false
  project: uniformevalbench
  offline: true
  tags:
  - pilot
  - biot
  - lp
  - adftd
  log_step_interval: 50
  ckpt_interval: 30
