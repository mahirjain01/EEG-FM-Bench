seed: 7
master_port: 51433
multitask: false
model_type: labram
fs: 200
data:
  batch_size: 32
  num_workers: 4
  datasets:
    motor_mv_img: finetune
model:
  classifier_head:
    head_type: avg_pool
    hidden_dims:
    - 128
    dropout: 0.3
  eeg_size: 2000
  patch_size: 200
  in_chans: 1
  out_chans: 8
  embed_dim: 200
  depth: 12
  num_heads: 10
  mlp_ratio: 4.0
  dropout_rate: 0.1
  attn_dropout_rate: 0.1
  drop_path_rate: 0.1
  init_values: 0.1
  init_scale: 0.001
  layer_scale_init_value: 0.1
  qkv_bias: false
  use_abs_pos_emb: true
  use_rel_pos_bias: false
  use_shared_rel_pos_bias: false
  use_mean_pooling: true
  pretrained_path: /mnt/eegfmbench/FM_checkpoints/labram/labram_wrapped.pt
training:
  max_epochs: 30
  weight_decay: 0.01
  max_grad_norm: 3.0
  lr_schedule: cosine
  max_lr: 0.0005
  encoder_lr_scale: 0.1
  warmup_epochs: 2
  warmup_scale: 0.01
  pct_start: 0.2
  min_lr: 1.0e-06
  freeze_encoder: true
  use_amp: true
  label_smoothing: 0.1
  lora:
    use_lora: false
logging:
  experiment_name: b3_labram_motor_mv_img_s7_p040
  run_dir: /mnt/eegfmbench/runs/uniformeval/axis_b_v3
  use_cloud: false
  project: uniformevalbench
  offline: true
  tags:
  - pilot
  - labram
  - lp
  - motor_mv_img
  log_step_interval: 50
  ckpt_interval: 30
