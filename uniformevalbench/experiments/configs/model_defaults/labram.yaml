# LaBraM model architecture defaults for UniformEvalBench
classifier_head:
  head_type: avg_pool
  hidden_dims: [128]
  dropout: 0.3
eeg_size: 2000
patch_size: 200
in_chans: 1
out_chans: 8
embed_dim: 200
depth: 12
num_heads: 10
mlp_ratio: 4.0
dropout_rate: 0.1
attn_dropout_rate: 0.1
drop_path_rate: 0.1
init_values: 0.1
init_scale: 0.001
layer_scale_init_value: 0.1
qkv_bias: false
use_abs_pos_emb: true
use_rel_pos_bias: false
use_shared_rel_pos_bias: false
use_mean_pooling: true
