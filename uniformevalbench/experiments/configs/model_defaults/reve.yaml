# REVE model architecture defaults for UniformEvalBench
# pos_bank_pretrained_path is set at runtime alongside pretrained_path
classifier_head:
  head_type: avg_pool
  hidden_dims: [128]
  dropout: 0.3
embed_dim: 512
depth: 22
heads: 8
head_dim: 64
mlp_dim_ratio: 2.66
use_geglu: true
freqs: 4
noise_ratio: 0.0025
patch_size: 200
patch_overlap: 20
dropout: 0.1
