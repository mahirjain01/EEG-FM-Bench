# EEGPT model architecture defaults for UniformEvalBench
# pretrained_path is set at runtime by config_builder.py
classifier_head:
  head_type: avg_pool
  hidden_dims: [128]
  dropout: 0.3
patch_size: 64
patch_stride: 32
embed_num: 4
embed_dim: 512
depth: 8
num_heads: 8
mlp_ratio: 4.0
dropout_rate: 0.1
attn_dropout_rate: 0.1
drop_path_rate: 0.1
init_std: 0.02
qkv_bias: true
use_channel_conv: false
conv_chan_dim: 22
linear_probe1_dim: 16
linear_probe1_max_norm: 1.0
linear_probe2_max_norm: 0.25
